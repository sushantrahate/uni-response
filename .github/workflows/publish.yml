name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    # Added permissions for OIDC (Required for modern npm security features)
    permissions:
      contents: read
      id-token: write 

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org/"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present

      - name: Build
        run: npm run build --if-present

      # Trusted Publishing (OIDC) requires npm 11.5.0+; Node 20's bundled npm may be older.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Publish to npm
        # No NPM_TOKEN needed: authenticates via GitHub OIDC against the
        # Trusted Publisher configured on the npmjs.com package settings.
        run: npm publish --provenance --access public
